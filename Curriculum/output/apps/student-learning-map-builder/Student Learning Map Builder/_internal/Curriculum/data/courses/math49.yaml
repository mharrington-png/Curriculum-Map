schema_version: 1
course:
  id: M49
  number: Math 49
  title: Precalculus with Limits
  status: approved
  source: source_documents/Math 49 Course Map.docx

units:
  - id: M49-FND
    title: Review Content
    priority: review
    objectives:
      - {id: M49-FND-001, statement: "I can determine the domain and range of a function from a formula, graph, or table."}
      - {id: M49-FND-002, statement: "I can describe and apply transformations of a parent function."}
      - {id: M49-FND-004, statement: "I can analyze exponential functions using their equations, graphs, and contexts."}
      - {id: M49-FND-005, statement: "I can analyze logarithmic functions using their equations, graphs, and contexts."}
      - {id: M49-FND-006, statement: "I can solve exponential and logarithmic equations using equivalent forms and logarithm properties."}

  - id: M49-OPS
    title: Function Operations, Composition, and Inverses
    priority: required
    objectives:
      - {id: M49-FND-003, statement: "I can determine whether a function is even, odd, or neither."}
      - {id: M49-OPS-001, statement: "I can add, subtract, multiply, and divide functions and state the resulting domain."}
      - {id: M49-OPS-002, statement: "I can evaluate a composition from formulas, graphs, or tables."}
      - {id: M49-OPS-003, statement: "I can write a formula for the composition of two functions and determine its domain."}
      - {id: M49-OPS-004, statement: "I can decompose a function into a composition of simpler functions."}
      - {id: M49-OPS-005, statement: "I can determine whether a function has an inverse on a given domain."}
      - {id: M49-OPS-006, statement: "I can find and verify an inverse function algebraically."}
      - {id: M49-OPS-007, statement: "I can interpret the relationship between a function and its inverse from graphs or tables."}

  - id: M49-PWR
    title: Power Functions
    priority: required
    objectives:
      - {id: M49-PWR-001, statement: "I can identify a power function and interpret the parameters in y = kx^p."}
      - {id: M49-PWR-002, statement: "I can construct a power function from two data points or a proportional relationship."}
      - {id: M49-PWR-003, statement: "I can relate the sign and size of k and p to the shape, domain behavior, and end behavior of a power function."}
      - {id: M49-PWR-004, statement: "I can recognize and model direct, inverse, and other power-variation relationships."}
      - {id: M49-PWR-005, statement: "I can solve equations involving integer or rational powers."}
      - {id: M49-PWR-007, statement: "I can build or select a power-function model for a context and interpret its parameters."}
      - {id: M49-PWR-008, statement: "I can analyze power functions with fractional exponents, including their domains, graph shapes, and behavior near zero."}

  - id: M49-POL
    title: Polynomial Functions
    priority: required
    objectives:
      - {id: M49-ALG-002, statement: "I can predict the end behavior of a polynomial from its degree and leading coefficient."}
      - {id: M49-ALG-003, statement: "I can determine polynomial zeros and their multiplicities."}
      - {id: M49-ALG-004, statement: "I can construct a polynomial function from specified zeros or graphical features."}
      - {id: M49-ALG-005, statement: "I can sketch and analyze a polynomial function using intercepts, multiplicity, and end behavior."}
      - {id: M49-POL-002, statement: "I can determine the minimum possible degree of a polynomial function from the zeros, turning points, inflection points, and end behavior of its graph."}
      - {id: M49-POL-001, statement: "I can build or select a polynomial model for a context and interpret its features."}

  - id: M49-RAT
    title: Rational Functions and Limits
    priority: required
    objectives:
      - {id: M49-ALG-006, statement: "I can identify holes and vertical, horizontal, or slant asymptotes of a rational function."}
      - {id: M49-ALG-007, statement: "I can sketch and analyze a rational function using its algebraic and asymptotic features."}
      - {id: M49-LIM-001, statement: "I can interpret limit notation as a statement about function behavior near an input."}
      - {id: M49-LIM-002, statement: "I can estimate a limit from a graph or table."}
      - {id: M49-LIM-003, statement: "I can evaluate a limit algebraically using direct substitution or simplification."}
      - {id: M49-LIM-005, statement: "I can interpret an infinite limit as vertical-asymptotic behavior."}
      - {id: M49-LIM-006, statement: "I can use limit notation to describe behavior at infinity."}
      - {id: M49-PWR-006, statement: "I can analyze the long-run behavior of quotients involving polynomial, exponential, or logarithmic expressions."}
      - {id: M49-LIM-007, statement: "I can compare the long-run growth of polynomial, exponential, logarithmic, and rational functions."}
      - {id: M49-ALG-008, statement: "I can build or select a rational or rational-adjacent model for a context and interpret its long-run behavior."}

  - id: M49-SS
    title: Sequences and Series
    priority: required
    objectives:
      - {id: M49-SEQ-001, statement: "I can evaluate and graph a sequence defined explicitly or recursively."}
      - {id: M49-SEQ-002, statement: "I can write explicit and recursive formulas for arithmetic sequences."}
      - {id: M49-SEQ-003, statement: "I can write explicit and recursive formulas for geometric sequences."}
      - {id: M49-SEQ-004, statement: "I can distinguish arithmetic, geometric, and other sequences from formulas, tables, or contexts."}
      - {id: M49-SEQ-005, statement: "I can create and interpret a sequence model for discrete change."}
      - {id: M49-SER-001, statement: "I can interpret and use summation notation."}
      - {id: M49-SER-002, statement: "I can calculate a finite arithmetic series."}
      - {id: M49-SER-003, statement: "I can calculate a finite geometric series."}
      - {id: M49-SER-004, statement: "I can determine whether an infinite geometric series converges and find its sum when it does."}
      - {id: M49-SER-005, statement: "I can create and interpret a series model for accumulated change."}

  - id: M49-LXE
    title: Additional Limit Concepts
    priority: extension
    objectives:
      - {id: M49-LIM-004, statement: "I can determine one-sided limits and decide whether a two-sided limit exists."}
      - {id: M49-LIM-008, statement: "I can distinguish a function value from a limit and determine continuity at a point."}

  - id: M49-PAR
    title: Parametric Equations
    priority: extension
    objectives:
      - {id: M49-PAR-001, statement: "I can graph a plane curve defined by parametric equations with its orientation."}
      - {id: M49-PAR-002, statement: "I can eliminate a parameter to obtain a rectangular equation."}
      - {id: M49-PAR-003, statement: "I can create or interpret parametric equations for motion in the plane."}

  - id: M49-CON
    title: Conic Sections
    priority: extension
    objectives:
      - {id: M49-CON-001, statement: "I can classify a circle, ellipse, or hyperbola from its equation or defining geometric relationship."}
      - {id: M49-CON-002, statement: "I can use completing the square to rewrite a general-form conic equation in standard form."}
      - {id: M49-CON-003, statement: "I can write, interpret, and graph implicit and parametric equations of a circle."}
      - {id: M49-CON-004, statement: "I can write, interpret, and graph implicit and parametric equations of an ellipse."}
      - {id: M49-CON-005, statement: "I can write, interpret, and graph implicit and parametric equations of a hyperbola."}
      - {id: M49-CON-006, statement: "I can determine the center, vertices, foci, axes, or asymptotes needed to describe a circle, ellipse, or hyperbola."}
      - {id: M49-CON-007, statement: "I can explain the geometric definitions of circles, ellipses, and hyperbolas using foci and distance relationships."}
      - {id: M49-CON-008, statement: "I can explain a parabola as the set of points equidistant from a focus and directrix."}


