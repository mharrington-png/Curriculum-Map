schema_version: 1
course:
  id: M39
  number: Math 39
  title: Precalculus with Data Analysis
  status: draft
  source: source_documents/Math 39

units:
  - id: M39-LIN
    title: Linear Modeling and Residuals
    priority: required
    objectives:
      - {id: M39-LIN-001, statement: "I can calculate and interpret average rate of change with appropriate units."}
      - {id: M39-LIN-002, statement: "I can construct a linear function from two data points, a table, a graph, or a context."}
      - {id: M39-LIN-003, statement: "I can fit a linear regression model to data using technology and interpret its parameters."}
      - {id: M39-LIN-004, statement: "I can interpret a correlation coefficient as evidence about the direction and strength of a linear relationship."}
      - {id: M39-LIN-005, statement: "I can calculate residuals, construct a residual plot, and use its pattern to evaluate a model."}
      - {id: M39-LIN-006, statement: "I can use a linear model to make and interpret predictions, including solving for either variable."}

  - id: M39-EXP
    title: Exponential Modeling
    priority: required
    objectives:
      - {id: M39-EXP-001, statement: "I can distinguish linear and exponential change using rates, multipliers, tables, graphs, or contexts."}
      - {id: M39-EXP-002, statement: "I can construct an exponential function from two data points, a table, or a context."}
      - {id: M39-EXP-003, statement: "I can interpret the initial value, growth or decay factor, and growth or decay rate of an exponential model."}
      - {id: M39-EXP-004, statement: "I can determine and interpret doubling time or half-life from an exponential model."}
      - {id: M39-EXP-005, statement: "I can solve exponential and logarithmic equations in modeling contexts."}
      - {id: M39-EXP-006, statement: "I can fit an exponential regression model using technology and evaluate its fit."}
      - {id: M39-EXP-007, statement: "I can compare linear and exponential models and justify which is more appropriate for a data set or context."}

  - id: M39-POW
    title: Power Functions and Function Comparison
    priority: required
    objectives:
      - {id: M39-POW-001, statement: "I can identify a power function and interpret the parameters in y = kx^p."}
      - {id: M39-POW-002, statement: "I can construct a power function from two data points or a proportional relationship."}
      - {id: M39-POW-003, statement: "I can relate the sign and size of k and p to the shape, domain behavior, and end behavior of a power function."}
      - {id: M39-POW-004, statement: "I can recognize and model direct, inverse, and other power-variation relationships."}
      - {id: M39-POW-005, statement: "I can solve equations involving integer or rational powers."}
      - {id: M39-POW-006, statement: "I can compare the long-run dominance of logarithmic, power, polynomial, and exponential functions."}
      - {id: M39-POW-007, statement: "I can fit a power regression model and interpret its parameters and correlation evidence."}
      - {id: M39-POW-008, statement: "I can linearize power or exponential data and translate between the linearized and original models."}

  - id: M39-POL
    title: Function Combinations and Polynomials
    priority: required
    objectives:
      - {id: M39-POL-001, statement: "I can add, subtract, multiply, and divide functions represented by tables, graphs, or formulas."}
      - {id: M39-POL-002, statement: "I can determine where a combination of functions is positive, zero, or undefined."}
      - {id: M39-POL-003, statement: "I can determine polynomial end behavior from degree and leading coefficient."}
      - {id: M39-POL-004, statement: "I can identify zeros and multiplicities and relate them to polynomial graph behavior."}
      - {id: M39-POL-005, statement: "I can estimate a polynomial's possible degree from its zeros, turning points, inflection points, and end behavior."}
      - {id: M39-POL-006, statement: "I can construct a polynomial function from specified zeros, multiplicities, and a point."}
      - {id: M39-POL-007, statement: "I can match polynomial formulas and graphs using intercepts, multiplicity, degree, and end behavior."}
      - {id: M39-POL-008, statement: "I can build and optimize a polynomial model in a geometric or economic context."}

  - id: M39-STA
    title: Describing Data
    priority: required
    objectives:
      - {id: M39-STA-001, statement: "I can distinguish categorical and quantitative data."}
      - {id: M39-STA-002, statement: "I can construct and interpret frequency and relative-frequency tables."}
      - {id: M39-STA-003, statement: "I can construct and interpret bar charts, pie charts, and histograms using appropriate technology."}
      - {id: M39-STA-004, statement: "I can identify misleading features in a data display."}
      - {id: M39-STA-005, statement: "I can describe a distribution's modality, symmetry, skewness, and outliers."}
      - {id: M39-STA-006, statement: "I can calculate and interpret mean, median, and mode and select an appropriate measure of center."}
      - {id: M39-STA-007, statement: "I can calculate and interpret range, standard deviation, quartiles, and interquartile range."}
      - {id: M39-STA-008, statement: "I can construct and interpret a five-number summary and boxplot."}
      - {id: M39-STA-009, statement: "I can use percentiles and z-scores to locate and compare values within distributions."}
      - {id: M39-STA-010, statement: "I can compare distributions using their shape, center, spread, and unusual features."}

  - id: M39-PRO
    title: Probability
    priority: required
    objectives:
      - {id: M39-PRO-001, statement: "I can organize categorical data in a contingency table or Venn diagram."}
      - {id: M39-PRO-002, statement: "I can calculate and interpret empirical, marginal, joint, and conditional probabilities from a contingency table."}
      - {id: M39-PRO-003, statement: "I can identify an experiment, outcomes, events, and a sample space."}
      - {id: M39-PRO-004, statement: "I can calculate theoretical probabilities when outcomes are equally likely."}
      - {id: M39-PRO-005, statement: "I can use complements to calculate probabilities."}
      - {id: M39-PRO-006, statement: "I can calculate probabilities of compound 'and' events and distinguish independent from dependent events."}
      - {id: M39-PRO-007, statement: "I can calculate probabilities of compound 'or' events and distinguish overlapping from disjoint events."}
      - {id: M39-PRO-008, statement: "I can compare experimental and theoretical probability and explain the law of large numbers."}

  - id: M39-EV
    title: Expected Value
    priority: extension
    objectives:
      - {id: M39-EV-001, statement: "I can calculate the expected value of a discrete probability situation."}
      - {id: M39-EV-002, statement: "I can interpret expected value to evaluate a game, risk, or long-run decision."}
